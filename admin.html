<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Crossroads</title>
    <link rel="icon" href="/crossroads-mark.png" type="image/png" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/portal.css" />
  </head>
  <body class="portal-page">
    <div class="portal-login" data-login-view>
      <div class="portal-login__card">
        <a class="brand portal-login__brand" href="/">
          <img class="brand-mark crossroads-logo" src="/crossroads-mark-transparent.png" alt="" width="48" height="48" />
        </a>
        <h1>Admin control</h1>
        <p class="flow-lead">Full clinic control — patients, scripts, appointments, telehealth, and reorders.</p>
        <form class="flow-form" data-login-form>
          <label>Email <input type="email" name="email" required placeholder="admin@crossroads.clinic" /></label>
          <label>Password <input type="password" name="password" required /></label>
          <p class="form-error" data-login-error hidden></p>
          <button class="button primary full" type="submit">Sign in</button>
        </form>
        <details class="demo-hint">
          <summary>Demo admin login</summary>
          <p><code>admin@crossroads.clinic</code> / <code>CrossroadsAdmin2026</code></p>
        </details>
      </div>
    </div>

    <div class="portal-app staff-app admin-app" data-app-view hidden>
      <aside class="portal-sidebar">
        <a class="brand portal-sidebar__brand" href="/"><span>Crossroads · Admin</span></a>
        <p class="portal-sidebar__user" data-sidebar-name></p>
        <nav class="portal-nav" data-admin-nav>
          <button type="button" class="active" data-view="overview">Overview</button>
          <button type="button" data-view="patients">Patients</button>
          <button type="button" data-view="scripts">Scripts</button>
          <button type="button" data-view="appointments">Appointments</button>
        </nav>
        <button type="button" class="portal-logout" data-logout>Sign out</button>
      </aside>

      <div class="portal-main">
        <header class="portal-top">
          <div>
            <p class="eyebrow">Clinic operations</p>
            <h1 data-page-title>Overview</h1>
          </div>
          <a class="button ghost" href="/doctor">Open doctor view</a>
        </header>

        <section class="portal-view is-active" data-admin-view="overview">
          <div class="stat-grid" data-admin-stats></div>
          <h3>Reorder requests</h3>
          <div data-reorder-list></div>
        </section>

        <section class="portal-view" data-admin-view="patients" hidden>
          <div class="admin-table-wrap" data-patients-table></div>
        </section>

        <section class="portal-view" data-admin-view="scripts" hidden>
          <div class="admin-table-wrap" data-scripts-table></div>
        </section>

        <section class="portal-view" data-admin-view="appointments" hidden>
          <div class="admin-table-wrap" data-appointments-table></div>
        </section>
      </div>
    </div>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
