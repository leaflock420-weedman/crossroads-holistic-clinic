# Crossroads HC — split portals on Render (shared API, isolated frontends).
# Delete any old Static Site on crossroads-holistic-clinic.onrender.com before applying.
# Custom domains later: api., book., portal., doctor., admin. → matching service.
services:
  - type: web
    name: crossroads-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_ONLY
        value: "1"
      - key: CLINIC_DOMAIN
        value: crossroads.clinic
      - key: ADMIN_PASSWORD
        value: CrossroadsAdmin2026
      - key: DOCTOR_PASSWORD
        value: Doctor2026
      - key: PORTAL_URL_API
        value: https://api.crossroads.clinic
      - key: PORTAL_URL_HOME
        value: https://crossroads.clinic
      - key: PORTAL_URL_BOOK
        value: https://book.crossroads.clinic
      - key: PORTAL_URL_PORTAL
        value: https://portal.crossroads.clinic
      - key: PORTAL_URL_DOCTOR
        value: https://doctor.crossroads.clinic
      - key: PORTAL_URL_ADMIN
        value: https://admin.crossroads.clinic

  - type: web
    name: crossroads-home
    runtime: static
    buildCommand: npm install && npm run build:home
    staticPublishPath: ./dist-static/home
    envVars:
      - key: VITE_API_HOST
        value: api.crossroads.clinic

  - type: web
    name: crossroads-book
    runtime: static
    buildCommand: npm install && npm run build:book
    staticPublishPath: ./dist-static/book
    envVars:
      - key: VITE_API_HOST
        value: api.crossroads.clinic

  - type: web
    name: crossroads-portal
    runtime: static
    buildCommand: npm install && npm run build:portal
    staticPublishPath: ./dist-static/portal
    envVars:
      - key: VITE_API_HOST
        value: api.crossroads.clinic

  - type: web
    name: crossroads-doctor
    runtime: static
    buildCommand: npm install && npm run build:doctor
    staticPublishPath: ./dist-static/doctor
    envVars:
      - key: VITE_API_HOST
        value: api.crossroads.clinic

  - type: web
    name: crossroads-admin
    runtime: static
    buildCommand: npm install && npm run build:admin
    staticPublishPath: ./dist-static/admin
    envVars:
      - key: VITE_API_HOST
        value: api.crossroads.clinic