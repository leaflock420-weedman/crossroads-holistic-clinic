# Crossroads HC — 2 custom domains (free plan):
#   crossroads.clinic + www  → all patient/doctor/admin frontends (path routes)
#   api.crossroads.clinic    → shared API + database
services:
  - type: web
    name: crossroads-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_ONLY
        value: "1"
      - key: CLINIC_DOMAIN
        value: crossroads.clinic
      - key: ADMIN_PASSWORD
        value: CrossroadsAdmin2026
      - key: DOCTOR_PASSWORD
        value: Doctor2026
      - key: PORTAL_URL_API
        value: https://api.crossroads.clinic
      - key: PORTAL_URL_HOME
        value: https://crossroads.clinic
      - key: PORTAL_URL_BOOK
        value: https://crossroads.clinic/start.html
      - key: PORTAL_URL_PORTAL
        value: https://crossroads.clinic/portal.html
      - key: PORTAL_URL_DOCTOR
        value: https://crossroads.clinic/doctor.html
      - key: PORTAL_URL_ADMIN
        value: https://crossroads.clinic/admin.html

  - type: web
    name: crossroads-home
    runtime: static
    buildCommand: npm install && npm run build:all
    staticPublishPath: ./dist-static/home
    envVars:
      - key: VITE_API_HOST
        value: api.crossroads.clinic