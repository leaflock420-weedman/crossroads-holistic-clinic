services:
  - type: web
    name: crossroads-holistic-clinic
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        value: CrossroadsAdmin2026
      - key: DOCTOR_PASSWORD
        value: Doctor2026